<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARC Group | Livestock Risk Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0d1117;--surface:#161b22;--surface2:#21262d;--border:#30363d;
  --border2:#3a4149;--gold:#c9a84c;--green:#2ecc71;--red:#e74c3c;
  --blue:#58a6ff;--text:#e6edf3;--text-muted:#7d8590;--text-dim:#8b949e;
  --blue-hdr:#1c5585;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'IBM Plex Sans',sans-serif;font-size:13px;min-height:100vh;}

/* LOGIN */
#login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;}
.login-box{background:var(--surface);border:1px solid var(--border2);padding:48px;width:400px;position:relative;}
.login-box::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--gold);}
.login-logo{font-family:'Bebas Neue',sans-serif;font-size:34px;letter-spacing:4px;color:var(--gold);margin-bottom:4px;}
.login-sub{font-size:11px;color:var(--text-muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:36px;}
.login-label{font-size:11px;color:var(--text-muted);letter-spacing:1.5px;text-transform:uppercase;display:block;margin-bottom:7px;}
.login-input{width:100%;background:var(--bg);border:1px solid var(--border2);color:var(--text);padding:11px 14px;font-family:'IBM Plex Mono',monospace;font-size:14px;outline:none;transition:border-color .2s;margin-bottom:18px;}
.login-input:focus{border-color:var(--gold);}
.login-btn{width:100%;background:var(--gold);border:none;color:#000;padding:13px;font-family:'IBM Plex Sans',sans-serif;font-weight:700;font-size:12px;letter-spacing:2px;text-transform:uppercase;cursor:pointer;}
.login-btn:hover{opacity:.85;}
.login-error{color:var(--red);font-size:12px;margin-top:10px;display:none;}

/* APP */
#app{display:none;}
.header{display:flex;align-items:center;justify-content:space-between;padding:0 20px;height:52px;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;}
.header-logo{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:3px;color:var(--gold);}
.header-right{display:flex;align-items:center;gap:14px;}
.header-user{font-size:11px;color:var(--text-muted);font-family:'IBM Plex Mono',monospace;}
.logout-btn{background:none;border:none;color:var(--text-muted);font-size:11px;cursor:pointer;font-family:'IBM Plex Sans',sans-serif;}
.data-status{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--text-muted);display:flex;align-items:center;gap:6px;}
.status-dot{width:7px;height:7px;border-radius:50%;background:var(--text-muted);}
.status-dot.live{background:var(--green);}
.status-dot.loading{background:var(--gold);animation:pulse 1s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.3;}}

/* TABS */
.tabs{display:flex;padding:0 20px;background:var(--surface);border-bottom:1px solid var(--border);overflow-x:auto;}
.tab{padding:11px 18px;font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-muted);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:all .2s;}
.tab.active{color:var(--gold);border-bottom-color:var(--gold);}
.main{padding:20px;max-width:1200px;margin:0 auto;}
.panel{display:none;}
.panel.active{display:block;}

/* ADMIN PANEL */
.admin-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;}
.admin-title{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:3px;color:var(--gold);}
.btn-primary{background:var(--gold);border:none;color:#000;padding:9px 18px;font-family:'IBM Plex Sans',sans-serif;font-weight:700;font-size:11px;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;}
.btn-primary:hover{opacity:.85;}
.btn-secondary{background:var(--surface2);border:1px solid var(--border2);color:var(--text-muted);padding:9px 18px;font-family:'IBM Plex Sans',sans-serif;font-size:11px;cursor:pointer;}
.btn-secondary:hover{background:var(--border2);}
.btn-danger{background:none;border:1px solid var(--red);color:var(--red);padding:7px 14px;font-family:'IBM Plex Sans',sans-serif;font-size:11px;cursor:pointer;}
.btn-danger:hover{background:rgba(231,76,60,.1);}
.btn-small{padding:5px 12px;font-size:10px;}

.clients-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px;margin-bottom:24px;}
.client-card{background:var(--surface);border:1px solid var(--border);padding:16px;position:relative;transition:border-color .2s;}
.client-card:hover{border-color:var(--border2);}
.client-card-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px;}
.client-name{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:2px;color:var(--text);}
.client-username{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--text-muted);margin-top:2px;}
.client-status{display:flex;align-items:center;gap:5px;font-size:10px;}
.client-status.has-data{color:var(--green);}
.client-status.no-data{color:var(--text-muted);}
.client-updated{font-size:10px;color:var(--text-muted);font-family:'IBM Plex Mono',monospace;margin-bottom:12px;}
.client-actions{display:flex;gap:6px;flex-wrap:wrap;}
.upload-label{background:var(--gold);color:#000;padding:5px 12px;font-family:'IBM Plex Sans',sans-serif;font-weight:700;font-size:10px;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;display:inline-block;}
.upload-label:hover{opacity:.85;}

/* SUMMARY CARDS */
.sum-cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-bottom:22px;}
.s-card{background:var(--surface);border:1px solid var(--border);padding:12px 14px;}
.s-card-label{font-size:10px;color:var(--text-muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:5px;}
.s-card-val{font-family:'IBM Plex Mono',monospace;font-size:18px;font-weight:600;}
.s-card-val.pos{color:var(--green);}
.s-card-val.neg{color:var(--red);}
.s-card-val.gold{color:var(--gold);}
.s-card-sub{font-size:10px;color:var(--text-muted);margin-top:2px;}

/* TABLES */
.sec-title{font-family:'Bebas Neue',sans-serif;font-size:17px;letter-spacing:2px;color:var(--gold);margin:20px 0 8px;border-bottom:1px solid var(--border);padding-bottom:5px;}
.xl-wrap{overflow-x:auto;margin-bottom:6px;}
.xl{border-collapse:collapse;font-family:'IBM Plex Mono',monospace;font-size:12px;}
.xl th,.xl td{border:1px solid var(--border2);padding:5px 10px;white-space:nowrap;}
.xl th{background:var(--surface2);color:var(--text-muted);font-size:10px;letter-spacing:1px;text-transform:uppercase;font-weight:600;text-align:center;}
.xl td{color:var(--text);text-align:right;}
.xl td.lbl{text-align:left;color:var(--text);font-family:'IBM Plex Sans',sans-serif;font-weight:600;background:var(--surface);}
.xl td.sub{text-align:left;color:var(--text-muted);font-family:'IBM Plex Sans',sans-serif;padding-left:22px;background:var(--surface);}
.xl td.hdr{background:var(--blue-hdr);color:#fff;font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:2px;text-align:center;font-weight:400;padding:8px;}
.xl td.goal{background:rgba(46,204,113,0.2);color:var(--green);font-weight:700;}
.xl td.yel{background:rgba(201,168,76,0.18);color:var(--gold);font-weight:700;}
.xl td.neg{color:var(--red);}
.xl td.dark{background:#080c12;color:#3a4560;}
.xl td.edit{background:rgba(200,200,200,0.07);border:1px solid rgba(200,200,200,0.18) !important;}
.xl-input{background:transparent;border:none;color:var(--gold);font-family:'IBM Plex Mono',monospace;font-size:12px;width:72px;text-align:right;outline:none;padding:0;}
.xl-input:focus{background:rgba(201,168,76,0.1);border-radius:2px;}
.note{font-size:11px;color:var(--text-muted);margin:4px 0 2px;font-style:italic;}
.note-green{background:rgba(46,204,113,0.08);border:1px solid rgba(46,204,113,0.2);color:#6de0a0;padding:3px 10px;font-size:11px;display:inline-block;margin-top:4px;}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:14px;}
.span-2{grid-column:span 2;}
@media(max-width:800px){.grid-4{grid-template-columns:1fr 1fr;}.span-2{grid-column:span 2;}}
.card{background:var(--surface);border:1px solid var(--border);padding:16px;margin-bottom:14px;}
.card-title{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--text-muted);margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.card-title::after{content:'';flex:1;height:1px;background:var(--border);}
.stat-val{font-family:'IBM Plex Mono',monospace;font-size:18px;font-weight:600;}
.stat-val.pos{color:var(--green);}
.stat-val.neg{color:var(--red);}
.tbl-wrap{overflow-x:auto;}
table.gen{width:100%;border-collapse:collapse;font-family:'IBM Plex Mono',monospace;font-size:12px;}
table.gen th{text-align:left;padding:7px 10px;font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-muted);border-bottom:1px solid var(--border2);background:var(--surface2);white-space:nowrap;}
table.gen td{padding:8px 10px;border-bottom:1px solid var(--border);color:var(--text-dim);white-space:nowrap;}
table.gen tr:hover td{background:rgba(255,255,255,0.02);}
.tr{text-align:right;}.tc{text-align:center;}
.tp{color:var(--green);}.tn{color:var(--red);}.tg{color:var(--gold);}
.badge{display:inline-block;padding:2px 7px;font-size:10px;letter-spacing:1px;text-transform:uppercase;font-weight:600;}
.b-buy{background:rgba(46,204,113,.12);color:var(--green);}
.b-sell{background:rgba(231,76,60,.12);color:var(--red);}
.b-put{background:rgba(88,166,255,.12);color:var(--blue);}
.b-call{background:rgba(201,168,76,.12);color:var(--gold);}
.b-fut{background:rgba(255,255,255,.06);color:var(--text-dim);}
.b-live{background:rgba(201,168,76,.1);color:var(--gold);}
.b-feed{background:rgba(88,166,255,.1);color:var(--blue);}
.chart-container{position:relative;height:300px;}
.chart-controls{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap;}
.cht-tog{background:var(--surface2);border:1px solid var(--border2);color:var(--text-muted);padding:4px 12px;font-size:11px;cursor:pointer;font-family:'IBM Plex Sans',sans-serif;}
.cht-tog.active{background:var(--gold);color:#000;border-color:var(--gold);font-weight:600;}
.empty{text-align:center;padding:60px 20px;color:var(--text-muted);}
.empty-icon{font-size:40px;margin-bottom:14px;opacity:.3;}
.empty-title{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:2px;color:var(--text-muted);margin-bottom:6px;}
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:var(--border2);}

/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:200;align-items:center;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal{background:var(--surface);border:1px solid var(--border2);padding:32px;width:480px;max-width:95vw;position:relative;}
.modal::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--gold);}
.modal-title{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:3px;color:var(--gold);margin-bottom:6px;}
.modal-sub{font-size:12px;color:var(--text-muted);margin-bottom:24px;line-height:1.6;}
.modal-label{font-size:10px;color:var(--text-muted);letter-spacing:1.5px;text-transform:uppercase;display:block;margin-bottom:7px;}
.modal-input{width:100%;background:var(--bg);border:1px solid var(--border2);color:var(--text);padding:10px 12px;font-family:'IBM Plex Mono',monospace;font-size:12px;outline:none;margin-bottom:16px;}
.modal-input:focus{border-color:var(--gold);}
.modal-btns{display:flex;gap:10px;margin-top:4px;flex-wrap:wrap;}
.toast{position:fixed;bottom:24px;right:24px;background:var(--surface);border:1px solid var(--border2);border-left:3px solid var(--gold);padding:12px 18px;font-size:12px;font-family:'IBM Plex Mono',monospace;z-index:999;opacity:0;transform:translateY(10px);transition:all .3s;}
.toast.show{opacity:1;transform:translateY(0);}
.toast.success{border-left-color:var(--green);}
.toast.error{border-left-color:var(--red);}
.spinner{display:inline-block;width:12px;height:12px;border:2px solid var(--border2);border-top-color:var(--gold);border-radius:50%;animation:spin .6s linear infinite;margin-right:6px;}
@keyframes spin{to{transform:rotate(360deg);}}
.client-selector{background:var(--surface);border:1px solid var(--border2);padding:6px 12px;margin-bottom:16px;display:flex;align-items:center;gap:10px;font-size:12px;color:var(--text-muted);}
.client-selector strong{color:var(--gold);font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:1px;}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">ARC GROUP</div>
    <div class="login-sub">Livestock Risk Management</div>
    <label class="login-label" for="lu">Username</label>
    <input class="login-input" type="text" id="lu" placeholder="username" autocomplete="username">
    <label class="login-label" for="lp">Password</label>
    <input class="login-input" type="password" id="lp" placeholder="••••••••" autocomplete="current-password">
    <button class="login-btn" onclick="doLogin()">SIGN IN</button>
    <div class="login-error" id="lerr">Invalid credentials. Please try again.</div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="header">
    <div class="header-logo">THE ARC GROUP</div>
    <div class="header-right">
      <div class="data-status" id="data-status"><div class="status-dot" id="status-dot"></div><span id="status-text">Ready</span></div>
      <span class="header-user" id="header-user"></span>
      <button class="logout-btn" onclick="doLogout()">Sign Out</button>
    </div>
  </div>
  <div class="tabs" id="main-tabs">
    <div class="tab active" onclick="showTab('summary')">Summary</div>
    <div class="tab" onclick="showTab('hedges')">Hedges</div>
    <div class="tab" onclick="showTab('lrp')">LRP</div>
    <div class="tab" onclick="showTab('whatif')">What If Analysis</div>
  </div>
  <div class="main">
    <div id="panel-summary" class="panel active"></div>
    <div id="panel-hedges" class="panel"></div>
    <div id="panel-lrp" class="panel"></div>
    <div id="panel-whatif" class="panel"></div>
  </div>
</div>

<!-- ADD CLIENT MODAL -->
<div class="modal-overlay" id="add-client-modal" onclick="if(event.target===this)closeAddClient()">
  <div class="modal">
    <div class="modal-title">Add New Client</div>
    <div class="modal-sub">Create login credentials for a new client. They will only be able to see their own data.</div>
    <label class="modal-label">Client Name (Display)</label>
    <input class="modal-input" id="new-client-name" placeholder="e.g. Johnson Ranch">
    <label class="modal-label">Username</label>
    <input class="modal-input" id="new-client-user" placeholder="e.g. johnsonranch">
    <label class="modal-label">Password</label>
    <input class="modal-input" id="new-client-pass" placeholder="e.g. johnson2025">
    <div class="modal-btns">
      <button class="btn-primary" onclick="saveNewClient()">Add Client</button>
      <button class="btn-secondary" onclick="closeAddClient()">Cancel</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- Hidden file inputs per client (created dynamically) -->
<div id="file-inputs" style="display:none"></div>

<script>
// ── CONFIG ────────────────────────────────────────────────
const JSONBIN_API_KEY = '$2a$10$cgdrlN8gPFU.Dwm/fKTAq.1H7brY3nFAQv9GWRngMeY9aZO/diMe2';
const JSONBIN_BASE    = 'https://api.jsonbin.io/v3';

// Master bin ID — stores the registry of all clients + their data bin IDs
// First run creates it; subsequent runs read/update it.
const REGISTRY_BIN_KEY = 'arc_registry_bin_id';

// ── BUILT-IN USERS (admin + initial clients) ──────────────
// Format: username -> { password, role, clientId }
// role: 'admin' or 'client'
// clientId links to entry in registry
let USERS = {
  blake:  { password:'koppitz2025',  role:'admin',  clientId:null },
  admin:  { password:'arcadmin2025', role:'admin',  clientId:null },
  arc:    { password:'arcgroup2025', role:'admin',  clientId:null }
};

// ── STATE ─────────────────────────────────────────────────
let currentUser   = null;
let currentRole   = null;
let currentClientId = null;
let currentData   = null;  // parsed workbook data for current view
let wifChart      = null;
let registry      = null;  // { clients: { id: {name,username,password,binId,updatedAt} } }
let registryBinId = null;

// ── AUTH ──────────────────────────────────────────────────
async function doLogin(){
  const u = document.getElementById('lu').value.trim().toLowerCase();
  const p = document.getElementById('lp').value;

  // Check built-in users
  if(USERS[u] && USERS[u].password === p){
    await loginSuccess(u, USERS[u].role, null);
    return;
  }

  // Check dynamic clients from registry
  await loadRegistry();
  if(registry && registry.clients){
    for(const [id, client] of Object.entries(registry.clients)){
      if(client.username === u && client.password === p){
        await loginSuccess(u, 'client', id);
        return;
      }
    }
  }

  document.getElementById('lerr').style.display='block';
}

async function loginSuccess(username, role, clientId){
  currentUser     = username;
  currentRole     = role;
  currentClientId = clientId;

  document.getElementById('login-screen').style.display='none';
  document.getElementById('app').style.display='block';
  document.getElementById('lerr').style.display='none';
  document.getElementById('header-user').textContent = username.toUpperCase();

  if(role === 'admin'){
    showAdminView();
  } else {
    // Client: load their data
    showClientView(clientId);
  }
}

document.addEventListener('keydown', e=>{
  if(e.key==='Enter' && document.getElementById('login-screen').style.display!=='none') doLogin();
});

function doLogout(){
  currentUser = null; currentRole = null; currentClientId = null; currentData = null;
  document.getElementById('login-screen').style.display='flex';
  document.getElementById('app').style.display='none';
  document.getElementById('lu').value='';
  document.getElementById('lp').value='';
  // Reset tabs
  showTab('summary');
}

// ── TABS ──────────────────────────────────────────────────
function showTab(name){
  const tabs = ['summary','hedges','lrp','whatif'];
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active', tabs[i]===name));
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('panel-'+name).classList.add('active');
}

// ── JSONBIN HELPERS ───────────────────────────────────────
async function jbCreate(data, name=''){
  const r = await fetch(`${JSONBIN_BASE}/b`, {
    method:'POST',
    headers:{'Content-Type':'application/json','X-Master-Key':JSONBIN_API_KEY,'X-Bin-Name':name,'X-Bin-Private':'false'},
    body: JSON.stringify(data)
  });
  if(!r.ok) throw new Error('JSONBin create failed: '+r.status);
  const j = await r.json();
  return j.metadata.id;
}

async function jbRead(binId){
  const r = await fetch(`${JSONBIN_BASE}/b/${binId}/latest`, {
    headers:{'X-Master-Key':JSONBIN_API_KEY}
  });
  if(!r.ok) throw new Error('JSONBin read failed: '+r.status);
  const j = await r.json();
  return j.record;
}

async function jbUpdate(binId, data){
  const r = await fetch(`${JSONBIN_BASE}/b/${binId}`, {
    method:'PUT',
    headers:{'Content-Type':'application/json','X-Master-Key':JSONBIN_API_KEY},
    body: JSON.stringify(data)
  });
  if(!r.ok) throw new Error('JSONBin update failed: '+r.status);
}

// ── REGISTRY ─────────────────────────────────────────────
async function loadRegistry(){
  if(registry) return registry;
  registryBinId = localStorage.getItem(REGISTRY_BIN_KEY);
  if(registryBinId){
    try{
      registry = await jbRead(registryBinId);
      return registry;
    } catch(e){ console.warn('Registry read failed, will recreate'); }
  }
  // Create new registry
  registry = { clients:{} };
  registryBinId = await jbCreate(registry, 'ARC-Registry');
  localStorage.setItem(REGISTRY_BIN_KEY, registryBinId);
  return registry;
}

async function saveRegistry(){
  if(!registryBinId){
    registryBinId = await jbCreate(registry, 'ARC-Registry');
    localStorage.setItem(REGISTRY_BIN_KEY, registryBinId);
  } else {
    await jbUpdate(registryBinId, registry);
  }
}

// ── ADMIN VIEW ────────────────────────────────────────────
async function showAdminView(){
  // Replace tabs with admin + client tabs
  const tabsEl = document.getElementById('main-tabs');
  tabsEl.innerHTML = `<div class="tab active" onclick="showAdminPanel()">⚙ Admin</div>`;

  // Clear panels
  ['summary','hedges','lrp','whatif'].forEach(p=>{
    document.getElementById('panel-'+p).innerHTML='';
    document.getElementById('panel-'+p).classList.remove('active');
  });

  document.getElementById('panel-summary').classList.add('active');
  await renderAdminPanel();
}

async function renderAdminPanel(){
  updateStatus('Loading clients…', true);
  await loadRegistry();
  updateStatus('Ready', false);

  const clients = registry.clients || {};
  const clientCount = Object.keys(clients).length;

  const cards = Object.entries(clients).map(([id, c])=>{
    const hasData = !!c.binId;
    return `
    <div class="client-card" id="card-${id}">
      <div class="client-card-top">
        <div>

// ── ADD CLIENT ────────────────────────────────────────────
function openAddClient(){
  document.getElementById('add-client-modal').classList.add('open');
}
function closeAddClient(){
  document.getElementById('add-client-modal').classList.remove('open');
  document.getElementById('new-client-name').value='';
  document.getElementById('new-client-user').value='';
  document.getElementById('new-client-pass').value='';
}

async function saveNewClient(){
  const name = document.getElementById('new-client-name').value.trim();
  const user = document.getElementById('new-client-user').value.trim().toLowerCase();
  const pass = document.getElementById('new-client-pass').value.trim();
  if(!name||!user||!pass){ showToast('Please fill in all fields.','error'); return; }

  // Check for duplicate username
  const existing = Object.values(registry.clients||{}).find(c=>c.username===user);
  if(existing || USERS[user]){ showToast('Username already exists.','error'); return; }

  const id = 'client_'+Date.now();
  if(!registry.clients) registry.clients={};
  registry.clients[id] = { name, username:user, password:pass, binId:null, updatedAt:null };

  updateStatus('Saving…', true);
  try{
    await saveRegistry();
    updateStatus('Saved', false);
    showToast(name+' added successfully!','success');
    closeAddClient();
    renderAdminPanel();
  } catch(e){
    updateStatus('Error', false);
    showToast('Failed to save: '+e.message,'error');
  }
}

// ── DELETE CLIENT ─────────────────────────────────────────
async function deleteClient(id){
  const c = registry.clients[id];
  if(!confirm(`Remove ${c.name}? This cannot be undone.`)) return;
  delete registry.clients[id];
  updateStatus('Saving…', true);
  try{
    await saveRegistry();
    updateStatus('Saved', false);
    showToast('Client removed.','success');
    renderAdminPanel();
  } catch(e){
    showToast('Failed: '+e.message,'error');
  }
}

// ── UPLOAD CLIENT EXCEL ───────────────────────────────────
async function uploadClientFile(event, clientId){
  const file = event.target.files[0]; if(!file) return;
  event.target.value='';
  const client = registry.clients[clientId];
  updateStatus('Parsing Excel…', true);
  showToast('Parsing '+file.name+'…');

  const reader = new FileReader();
  reader.onload = async e=>{
    try{
      const wb = XLSX.read(new Uint8Array(e.target.result),{type:'array',cellDates:true});
      const data = parseWorkbook(wb);
      data.clientName = client.name;
      data.uploadDate = new Date().toLocaleDateString();

      updateStatus('Uploading to cloud…', true);

      if(client.binId){
        await jbUpdate(client.binId, data);
      } else {
        const binId = await jbCreate(data, 'ARC-'+client.name);
        registry.clients[clientId].binId = binId;
      }
      registry.clients[clientId].updatedAt = new Date().toLocaleDateString()+' '+new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
      await saveRegistry();

      updateStatus('Uploaded ✓', false);
      showToast(client.name+' data uploaded!','success');
      renderAdminPanel();
    } catch(err){
      updateStatus('Error', false);
      showToast('Upload failed: '+err.message,'error');
      console.error(err);
    }
  };
  reader.readAsArrayBuffer(file);
}

// ── EXCEL PARSERS (unchanged from original) ───────────────
function gc(ws,row,col){
  if(!ws)return null;
  const cell=ws[XLSX.utils.encode_cell({r:row-1,c:col-1})];
  if(!cell||cell.t==='e')return null;
  return cell.v;
}
function gt(ws,row,col){
  if(!ws)return'';
  const cell=ws[XLSX.utils.encode_cell({r:row-1,c:col-1})];
  if(!cell||cell.t==='e')return'';
  if(cell.t==='d'){
    try{const d=new Date(cell.v);return(d.getMonth()+1).toString().padStart(2,'0')+'/'+d.getDate().toString().padStart(2,'0')+'/'+d.getFullYear();}
    catch{return String(cell.v);}
  }
  return cell.v!=null?String(cell.v):'';
}

function parseWorkbook(wb){
  const sumWs=wb.Sheets['Summary']||wb.Sheets['Summary (2)'];
  const hedWs=wb.Sheets['Hedges'];
  const lrpWs=wb.Sheets['LRP'];
  const lcWifWs=wb.Sheets['Live Cattle What If'];
  const fcWifWs=wb.Sheets['Feeder Cattle What If'];
  const cbWifWs=wb.Sheets['Combined What If'];
  return{
    summary:     parseSummary(sumWs),
    hedges:      parseHedges(hedWs),
    lrp:         parseLRP(lrpWs),
    lcPositions: parsePositions(lcWifWs,'LE'),
    fcPositions: parsePositions(fcWifWs,'GF'),
    whatif:      parseWhatIf(fcWifWs,lcWifWs,cbWifWs),
    uploadDate:  new Date().toLocaleDateString()
  };
}

function parseSummary(ws){
  if(!ws)return{};
  return{
    acct:gc(ws,2,2),
    lc:{contracts:gc(ws,4,3),head:gc(ws,4,4),avgPrice:gc(ws,4,5),delta:gc(ws,4,6),
        fut:{contracts:gc(ws,5,3),avgPrice:gc(ws,5,5)},
        put:{contracts:gc(ws,6,3)},
        lrp:{contracts:gc(ws,7,3),head:gc(ws,7,4),delta:gc(ws,7,6)}},
    fc:{contracts:gc(ws,8,3),head:gc(ws,8,4),avgPrice:gc(ws,8,5),delta:gc(ws,8,6),
        fut:{contracts:gc(ws,9,3),head:gc(ws,9,4),avgPrice:gc(ws,9,5)},
        put:{contracts:gc(ws,10,3),head:gc(ws,10,4),avgPrice:gc(ws,10,5)},
        lrp:{contracts:gc(ws,11,3),head:gc(ws,11,4),delta:gc(ws,11,6)}},
    prot:{
      head:{live:gc(ws,16,4),feeder:gc(ws,16,5),total:gc(ws,16,6),goal:gc(ws,16,7)},
      delta:{live:gc(ws,17,4),feeder:gc(ws,17,5),total:gc(ws,17,6)}
    },
    lc_cur:{head:gc(ws,21,4),cash:gc(ws,21,5),cashVal:gc(ws,21,7),openHedge:gc(ws,21,8),netPrice:gc(ws,21,9)},
    lc_wi: {head:gc(ws,22,4),cash:gc(ws,22,5),fut:gc(ws,22,6),cashVal:gc(ws,22,7),openHedge:gc(ws,22,8),netPrice:gc(ws,22,9)},
    lc_wt: {weight:gc(ws,23,5),hedgeDiff:gc(ws,23,8),var:gc(ws,23,9)},
    fc_cur:{head:gc(ws,27,4),cash:gc(ws,27,5),cashVal:gc(ws,27,7),openHedge:gc(ws,27,8),netPrice:gc(ws,27,9)},
    fc_wi: {head:gc(ws,28,4),cash:gc(ws,28,5),fut:gc(ws,28,6),cashVal:gc(ws,28,7),openHedge:gc(ws,28,8),netPrice:gc(ws,28,9)},
    fc_wt: {weight:gc(ws,29,5),hedgeDiff:gc(ws,29,8),var:gc(ws,29,9)}
  };
}

function parseHedges(ws){
  if(!ws)return{openPL:0,rows:[]};
  const openPL=gc(ws,1,8);
  const rows=[];
  const rng=XLSX.utils.decode_range(ws['!ref']||'A1:W1');
  for(let r=3;r<=rng.e.r+1;r++){
    const desc=gc(ws,r,3),contract=gc(ws,r,10);
    if(!desc&&!contract)continue;
    rows.push({date:gt(ws,r,1),bs:gc(ws,r,2),desc,contracts:gc(ws,r,4),
      size:gc(ws,r,5),enterPrice:gc(ws,r,6),currPrice:gc(ws,r,7),
      openPL:gc(ws,r,8),contract,type:gc(ws,r,11),strike:gc(ws,r,12),cattleType:gc(ws,r,13)});
  }
  return{openPL,rows};
}

function parseLRP(ws){
  if(!ws)return{openPL:0,rows:[]};
  const openPL=gc(ws,2,14);
  const rows=[];
  const rng=XLSX.utils.decode_range(ws['!ref']||'A1:P1');
  for(let r=4;r<=rng.e.r+1;r++){
    const dateVal=gc(ws,r,1);
    const head=gc(ws,r,7);
    if(!dateVal||!head)continue;
    rows.push({
      date:gt(ws,r,1),bs:gc(ws,r,2),desc:gc(ws,r,3),contract:gc(ws,r,4),
      type:gc(ws,r,5),strike:gc(ws,r,6),head,typeCode:gc(ws,r,8),
      contracts:gc(ws,r,9),weight:gc(ws,r,10),totalCost:gc(ws,r,11),
      priceCwt:gc(ws,r,12),currPrice:gc(ws,r,13),openPL:gc(ws,r,14),cattleType:gc(ws,r,15)
    });
  }
  return{openPL,rows};
}

function parsePositions(ws,filterType){
  if(!ws)return[];
  const positions=[];
  const rng=XLSX.utils.decode_range(ws['!ref']||'A1:A1');
  for(let r=4;r<=Math.min(rng.e.r+1,3901);r++){
    const O=gc(ws,r,15);
    if(!O||O!==filterType)continue;
    const J=gc(ws,r,10);
    if(J&&J>0)continue;
    const Q=gc(ws,r,17);
    const F=gc(ws,r,6),G=gc(ws,r,7),H=gc(ws,r,8),I=gc(ws,r,9);
    const S=gc(ws,r,19)||0,T=gc(ws,r,20)||0,U=gc(ws,r,21)||0,V=gc(ws,r,22)||0;
    if(!Q||!G||!H)continue;
    positions.push({type:Q.trim(),strike:F,contracts:G,size:H,entryPrice:I,premium:(S+T+U+V)});
  }
  return positions;
}

function parseWhatIf(fcWs,lcWs,cbWs){
  const r={pcts:[],feederPrices:[],livePrices:[],feederVAR:[],liveVAR:[],combinedVAR:[]};
  if(!fcWs&&!lcWs)return r;
  for(let c=50;c<=91;c++){
    const pct=fcWs?gc(fcWs,1,c):gc(lcWs,1,c);
    if(pct==null)continue;
    r.pcts.push(pct);
    if(fcWs){r.feederPrices.push(gc(fcWs,2,c));r.feederVAR.push(gc(fcWs,3,c));}
    if(lcWs){r.livePrices.push(gc(lcWs,2,c));r.liveVAR.push(gc(lcWs,3,c));}
  }
  if(cbWs){for(let c=2;c<=42;c++)r.combinedVAR.push(gc(cbWs,2,c));}
  return r;
}

// ── VAR ───────────────────────────────────────────────────
function positionPL(pos,price){
  const{type,strike,contracts,size,entryPrice,premium}=pos;
  let pl=0;
  const t=type.toLowerCase();
  if(t==='sell futures')     pl=entryPrice-price;
  else if(t==='buy futures') pl=price-entryPrice;
  else if(t==='buy put')     pl=price<strike?strike-price:0;
  else if(t==='sell put')    pl=price>strike?0:price-strike;
  else if(t==='buy call')    pl=price>strike?price-strike:0;
  else if(t==='sell call')   pl=price>strike?strike-price:0;
  return(premium+pl)*contracts*size;
}

// ── FORMAT ────────────────────────────────────────────────
function f$(v,d=2){
  if(v==null||v===''||isNaN(v))return'—';
  const n=Number(v),abs=Math.abs(n).toLocaleString('en-US',{minimumFractionDigits:d,maximumFractionDigits:d});
  return n<0?'($'+abs+')':'$'+abs;
}
function fN(v,d=2){if(v==null||v===''||isNaN(v))return'—';return Number(v).toLocaleString('en-US',{minimumFractionDigits:d,maximumFractionDigits:d});}
function fP(v){return(v==null||isNaN(v))?'—':(Number(v)*100).toFixed(1)+'%';}
function nc(v){return(v!=null&&!isNaN(v)&&Number(v)<0)?'neg':'';}
function tc(v){return(v!=null&&!isNaN(v))?Number(v)<0?'tn':Number(v)>0?'tp':'':'';}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

        <td id="lc_np_wi">$ ${fN(lwi.netPrice,3)}</td>
      </tr>
      <tr>
        <td class="sub">Weight</td>
        <td class="edit"><input class="xl-input" id="lc_weight" type="number" value="${lwt.weight??''}" oninput="recalcAll()"></td>
        <td></td><td></td><td>$ —</td>
        <td id="lc_hedge_diff" class="${nc(lwt.hedgeDiff)}">${f$(lwt.hedgeDiff,0)}</td>
        <td id="lc_var" class="yel">${f$(lwt.var,0)}</td>
      </tr>
    </tbody>
  </table></div>
  <div class="note">* You can change the values in the gray cells.</div>
  <div class="note-green">$$ — Current Futures Price is marked-to-market at recent prices</div>
  <div class="xl-wrap" style="margin-top:22px"><table class="xl" style="width:auto">
    <thead>
      <tr><td colspan="7" class="hdr">FEEDER CATTLE</td></tr>
      <tr><th style="width:150px;text-align:left"></th><th>Head</th><th>Cash</th><th>Futures</th><th>Cash Value</th><th>Open Hedges</th><th>Net Price</th></tr>
    </thead>
    <tbody>
      <tr>
        <td class="lbl">Current Inventory</td>
        <td class="edit"><input class="xl-input" id="fc_head_cur" type="number" value="${fcr.head??''}" oninput="recalcAll()"></td>
        <td class="edit">$&nbsp;<input class="xl-input" id="fc_cash_cur" type="number" step="0.001" value="${fcr.cash??''}" oninput="recalcAll()"></td>
        <td class="dark">$$</td>
        <td id="fc_cv_cur">$ ${fN(fcr.cashVal,0)}</td>
        <td id="fc_oh_cur" class="${nc(fcr.openHedge)}">${f$(fcr.openHedge,0)}</td>
        <td id="fc_np_cur">$ ${fN(fcr.netPrice,3)}</td>
      </tr>
      <tr>
        <td class="lbl">What If</td>
        <td class="edit"><input class="xl-input" id="fc_head_wi" type="number" value="${fwi.head??''}" oninput="recalcAll()"></td>
        <td class="edit">$&nbsp;<input class="xl-input" id="fc_cash_wi" type="number" step="0.001" value="${fwi.cash??''}" oninput="recalcAll()"></td>
        <td class="edit">$&nbsp;<input class="xl-input" id="fc_fut_wi" type="number" step="0.001" value="${fwi.fut??''}" oninput="recalcAll()"></td>
        <td id="fc_cv_wi">$ ${fN(fwi.cashVal,0)}</td>
        <td id="fc_oh_wi" class="${nc(fwi.openHedge)}">${f$(fwi.openHedge,0)}</td>
        <td id="fc_np_wi">$ ${fN(fwi.netPrice,3)}</td>
      </tr>
      <tr>
        <td class="sub">Weight</td>
        <td class="edit"><input class="xl-input" id="fc_weight" type="number" value="${fwt.weight??''}" oninput="recalcAll()"></td>
        <td></td><td></td><td>$ —</td>
        <td id="fc_hedge_diff" class="${nc(fwt.hedgeDiff)}">${f$(fwt.hedgeDiff,0)}</td>
        <td id="fc_var" class="yel">${f$(fwt.var,0)}</td>
      </tr>
    </tbody>
  </table></div>
  <div class="note">* You can change the values in the gray cells.</div>
  <div class="note-green">$$ — Current Futures Price is marked-to-market at recent prices</div>
  `;
  recalcAll();
}

function recalcAll(){
  if(!currentData)return;
  const lcHC=parseFloat(document.getElementById('lc_head_cur')?.value)||0;
  const lcCC=parseFloat(document.getElementById('lc_cash_cur')?.value)||0;
  const lcHW=parseFloat(document.getElementById('lc_head_wi')?.value)||0;
  const lcCW=parseFloat(document.getElementById('lc_cash_wi')?.value)||0;
  const lcFW=parseFloat(document.getElementById('lc_fut_wi')?.value)||0;
  const lcWt=parseFloat(document.getElementById('lc_weight')?.value)||0;
  const lcCwt=lcWt/100;
  const lcOHCur=currentData.summary?.lc_cur?.openHedge||0;
  const lcCVCur=lcHC*lcCC*lcCwt;
  const lcCVWI=lcHW*lcCW*lcCwt;
  const lcOHWI=(currentData.lcPositions||[]).reduce((s,p)=>s+positionPL(p,lcFW),0);
  const lcNPCur=lcHC>0&&lcCwt>0?(lcCVCur+lcOHCur)/(lcHC*lcCwt):0;
  const lcNPWI=lcHW>0&&lcCwt>0?(lcCVWI+lcOHWI)/(lcHW*lcCwt):0;
  const lcHD=lcOHWI-lcOHCur;
  const lcVAR=(lcCVWI-lcCVCur)+lcHD;
  setEl('lc_cv_cur','$ '+fN(lcCVCur,0));
  setEl('lc_oh_cur',f$(lcOHCur,0),nc(lcOHCur));
  setEl('lc_np_cur','$ '+fN(lcNPCur,3));
  setEl('lc_cv_wi','$ '+fN(lcCVWI,0));
  setEl('lc_oh_wi',f$(lcOHWI,0),nc(lcOHWI));
  setEl('lc_np_wi','$ '+fN(lcNPWI,3));
  setEl('lc_hedge_diff',f$(lcHD,0),nc(lcHD));
  setEl('lc_var',f$(lcVAR,0),'yel');
  const fcHC=parseFloat(document.getElementById('fc_head_cur')?.value)||0;
  const fcCC=parseFloat(document.getElementById('fc_cash_cur')?.value)||0;
  const fcHW=parseFloat(document.getElementById('fc_head_wi')?.value)||0;
  const fcCW=parseFloat(document.getElementById('fc_cash_wi')?.value)||0;
  const fcFW=parseFloat(document.getElementById('fc_fut_wi')?.value)||0;
  const fcWt=parseFloat(document.getElementById('fc_weight')?.value)||0;
  const fcCwt=fcWt/100;
  const fcOHCur=currentData.summary?.fc_cur?.openHedge||0;
  const fcCVCur=fcHC*fcCC*fcCwt;
  const fcCVWI=fcHW*fcCW*fcCwt;
  const fcOHWI=(currentData.fcPositions||[]).reduce((s,p)=>s+positionPL(p,fcFW),0);
  const fcNPCur=fcHC>0&&fcCwt>0?(fcCVCur+fcOHCur)/(fcHC*fcCwt):0;
  const fcNPWI=fcHW>0&&fcCwt>0?(fcCVWI+fcOHWI)/(fcHW*fcCwt):0;
  const fcHD=fcOHWI-fcOHCur;
  const fcVAR=(fcCVWI-fcCVCur)+fcHD;
  setEl('fc_cv_cur','$ '+fN(fcCVCur,0));
  setEl('fc_oh_cur',f$(fcOHCur,0),nc(fcOHCur));
  setEl('fc_np_cur','$ '+fN(fcNPCur,3));
  setEl('fc_cv_wi','$ '+fN(fcCVWI,0));
  setEl('fc_oh_wi',f$(fcOHWI,0),nc(fcOHWI));
  setEl('fc_np_wi','$ '+fN(fcNPWI,3));
  setEl('fc_hedge_diff',f$(fcHD,0),nc(fcHD));
  setEl('fc_var',f$(fcVAR,0),'yel');
}
function setEl(id,txt,cls){const el=document.getElementById(id);if(!el)return;el.textContent=txt;if(cls!==undefined)el.className=cls;}

// ── HEDGES ────────────────────────────────────────────────
function renderHedges(c){
  const h=c.hedges;
  if(!h||!h.rows||!h.rows.length){document.getElementById('panel-hedges').innerHTML=emptyState('No Hedge Data','No hedge positions found in this file.');return;}
  const rows=h.rows.filter(r=>r.desc||r.contract);
  const tbody=rows.map(r=>{
    const bsCls=r.bs==='Buy'?'b-buy':'b-sell';
    const tCls=r.type==='Put'?'b-put':r.type==='Call'?'b-call':'b-fut';
    const catCls=r.cattleType==='Live'?'b-live':r.cattleType==='Feeder'?'b-feed':'';
    return`<tr><td>${r.date||''}</td><td><span class="badge ${bsCls}">${r.bs||''}</span></td><td>${r.desc||''}</td><td class="tr">${r.contracts||''}</td><td class="tr">${r.size||''}</td><td class="tr">${fN(r.enterPrice,3)}</td><td class="tr">${fN(r.currPrice,3)}</td><td class="tr ${tc(r.openPL)}">${f$(r.openPL)}</td><td>${r.contract||''}</td><td><span class="badge ${tCls}">${r.type||''}</span></td><td class="tr">${r.strike||''}</td><td>${r.cattleType?`<span class="badge ${catCls}">${r.cattleType}</span>`:''}</td></tr>`;
  }).join('');
  document.getElementById('panel-hedges').innerHTML=`
    <div class="grid-4"><div class="card span-2"><div class="card-title">ADMIS — Total Open P/L</div><div class="stat-val ${h.openPL<0?'neg':'pos'}">${f$(h.openPL)}</div></div><div class="card"><div class="card-title">Total Positions</div><div class="stat-val">${rows.length}</div></div></div>
    <div class="card"><div class="card-title">Hedge Positions</div><div class="tbl-wrap"><table class="gen"><thead><tr><th>Date</th><th>B/S</th><th>Description</th><th class="tr">Contracts</th><th class="tr">Size</th><th class="tr">Enter $</th><th class="tr">Current $</th><th class="tr">Open P/L</th><th>Contract</th><th>Type</th><th class="tr">Strike</th><th>Category</th></tr></thead><tbody>${tbody}</tbody></table></div></div>`;
}

// ── LRP ───────────────────────────────────────────────────
function renderLRP(c){
  const l=c.lrp;
  if(!l||!l.rows||!l.rows.length){document.getElementById('panel-lrp').innerHTML=emptyState('No LRP Data','No LRP policies found in this file.');return;}
  const tbody=l.rows.map(r=>{
    const catCls=r.cattleType==='Live'?'b-live':r.cattleType==='Feeder'?'b-feed':'';
    return`<tr><td>${r.date||''}</td><td>${r.contract||''}</td><td>${r.type||''}</td><td class="tr">${fN(r.strike,2)}</td><td class="tr">${fN(r.head,0)}</td><td>${r.typeCode||''}</td><td class="tr">${fN(r.contracts,2)}</td><td class="tr">${fN(r.weight,0)}</td><td class="tr">${r.totalCost||''}</td><td class="tr">${fN(r.priceCwt,3)}</td><td class="tr">${fN(r.currPrice,2)}</td><td class="tr ${tc(r.openPL)}">${f$(r.openPL,2)}</td><td>${r.cattleType?`<span class="badge ${catCls}">${r.cattleType}</span>`:''}</td></tr>`;
  }).join('');
  document.getElementById('panel-lrp').innerHTML=`
    <div class="grid-4" style="margin-bottom:14px">
      <div class="card span-2"><div class="card-title">LRP — Total Open P/L</div><div class="stat-val ${l.openPL<0?'neg':'pos'}">${f$(l.openPL,2)}</div></div>
      <div class="card"><div class="card-title">Active Policies</div><div class="stat-val">${l.rows.length}</div></div>
    </div>
    <div class="card"><div class="card-title">Livestock Risk Protection Policies</div>
      <div class="tbl-wrap"><table class="gen"><thead><tr><th>Date</th><th>Contract</th><th>Type</th><th class="tr">Strike</th><th class="tr">Head</th><th>Code</th><th class="tr">Contracts</th><th class="tr">Weight</th><th class="tr">Total Cost</th><th class="tr">$/CWT</th><th class="tr">Current $</th><th class="tr">Open P/L</th><th>Category</th></tr></thead><tbody>${tbody}</tbody></table></div>
    </div>`;
}

// ── WHAT IF ───────────────────────────────────────────────
function renderWhatIf(c){
  const w=c.whatif;
  if(!w||!w.pcts||!w.pcts.length){document.getElementById('panel-whatif').innerHTML=emptyState('No What If Data','No scenario analysis found in this file.');return;}
  const curIdx=w.pcts.findIndex(p=>Math.abs(p)<0.001);
  const tableRows=w.pcts.map((p,i)=>{
    const cur=Math.abs(p)<0.001;
    return`<tr style="${cur?'background:rgba(201,168,76,0.07)':''}"><td class="${cur?'tg tr':'tr'}">${cur?'→ ':''}${(p*100).toFixed(1)}%</td><td class="tr">${f$(w.feederPrices[i],2)}</td><td class="tr">${f$(w.livePrices[i],2)}</td><td class="tr ${tc(w.feederVAR[i])}">${f$(w.feederVAR[i],0)}</td><td class="tr ${tc(w.liveVAR[i])}">${f$(w.liveVAR[i],0)}</td><td class="tr ${tc(w.combinedVAR[i])}">${f$(w.combinedVAR[i],0)}</td></tr>`;
  }).join('');
  document.getElementById('panel-whatif').innerHTML=`
    <div class="grid-4">
      <div class="card"><div class="card-title">Scenarios</div><div class="stat-val">${w.pcts.length}</div></div>
      <div class="card"><div class="card-title">Feeder VAR (Current)</div><div class="stat-val ${w.feederVAR[curIdx]<0?'neg':'pos'}">${f$(w.feederVAR[curIdx],0)}</div></div>
      <div class="card"><div class="card-title">Live VAR (Current)</div><div class="stat-val ${w.liveVAR[curIdx]<0?'neg':'pos'}">${f$(w.liveVAR[curIdx],0)}</div></div>
      <div class="card"><div class="card-title">Combined VAR (Current)</div><div class="stat-val ${w.combinedVAR[curIdx]<0?'neg':'pos'}">${f$(w.combinedVAR[curIdx],0)}</div></div>
    </div>
    <div class="card">
      <div class="card-title">Value at Risk — Price Sensitivity</div>
      <div class="chart-controls">
        <button class="cht-tog active" id="tog-combined" onclick="setWM('combined')">Combined</button>
        <button class="cht-tog" id="tog-feeder" onclick="setWM('feeder')">Feeder Cattle</button>
        <button class="cht-tog" id="tog-live" onclick="setWM('live')">Live Cattle</button>
        <button class="cht-tog" id="tog-all" onclick="setWM('all')">All Three</button>
      </div>
      <div class="chart-container"><canvas id="wif-chart"></canvas></div>
    </div>
    <div class="card"><div class="card-title">Scenario Table</div>
      <div class="tbl-wrap"><table class="gen"><thead><tr><th>Change</th><th class="tr">Feeder Price</th><th class="tr">Live Price</th><th class="tr">Feeder VAR</th><th class="tr">Live VAR</th><th class="tr">Combined VAR</th></tr></thead><tbody>${tableRows}</tbody></table></div>
    </div>`;
  buildChart(c,'combined');
}

function setWM(m){
  ['combined','feeder','live','all'].forEach(x=>{const e=document.getElementById('tog-'+x);if(e)e.classList.toggle('active',x===m);});
  if(currentData)buildChart(currentData,m);
}
function buildChart(c,mode){
  const w=c.whatif;
  const labels=w.pcts.map(p=>(p*100).toFixed(1)+'%');
  const ctx=document.getElementById('wif-chart');
  if(!ctx)return;
  if(wifChart)wifChart.destroy();
  const ds=[];
  if(mode==='combined'||mode==='all')ds.push({label:'Combined VAR',data:w.combinedVAR,borderColor:'#c9a84c',backgroundColor:'rgba(201,168,76,0.08)',fill:mode==='combined',tension:0.4,pointRadius:0,borderWidth:2});
  if(mode==='feeder'||mode==='all')  ds.push({label:'Feeder VAR',  data:w.feederVAR,  borderColor:'#58a6ff',backgroundColor:'rgba(88,166,255,0.06)', fill:mode==='feeder',  tension:0.4,pointRadius:0,borderWidth:2});
  if(mode==='live'||mode==='all')    ds.push({label:'Live VAR',    data:w.liveVAR,    borderColor:'#2ecc71',backgroundColor:'rgba(46,204,113,0.06)', fill:mode==='live',    tension:0.4,pointRadius:0,borderWidth:2});
  wifChart=new Chart(ctx,{type:'line',data:{labels,datasets:ds},options:{
    responsive:true,maintainAspectRatio:false,interaction:{mode:'index',intersect:false},
    plugins:{legend:{labels:{color:'#7d8590',font:{family:'IBM Plex Mono',size:11}}},
      tooltip:{backgroundColor:'#161b22',borderColor:'#3a4149',borderWidth:1,titleColor:'#c9a84c',bodyColor:'#e6edf3',
        callbacks:{label:ctx=>` ${ctx.dataset.label}: ${f$(ctx.raw,0)}`}}},
    scales:{
      x:{grid:{color:'#21262d'},ticks:{color:'#7d8590',font:{family:'IBM Plex Mono',size:10},maxTicksLimit:20}},
      y:{grid:{color:'#21262d'},ticks:{color:'#7d8590',font:{family:'IBM Plex Mono',size:10},callback:v=>f$(v/1000000,1)+'M'}}
    }
  }});
}

function emptyState(title,sub){return`<div class="empty"><div class="empty-icon">📊</div><div class="empty-title">${title}</div><div style="font-size:12px;line-height:1.6;color:var(--text-muted)">${sub}</div></div>`;}
</script>
